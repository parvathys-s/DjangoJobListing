{% extends 'base.html' %}

{% block content %}
<h2>Available Jobs</h2>

<table class="table table-striped">
    <tr>
        <th>Company</th>
        <th>Role</th>
        <th>Salary</th>
    </tr>

    {% for job in jobs %}
    <tr>
        <td>{{ job.companyname }}</td>
        <td>{{ job.jobrole }}</td>
        <td>{{ job.salary }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
